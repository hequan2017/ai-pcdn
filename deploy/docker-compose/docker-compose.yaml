# Modified for ai-pcdn on 2026-07-21: use a persistent local SQLite deployment.
name: ai-pcdn

services:
  server:
    build:
      context: ../../server
      dockerfile: ./Dockerfile
    container_name: ai-pcdn-server
    restart: unless-stopped
    ports:
      - "${AI_PCDN_SERVER_PORT:-8888}:8888"
    volumes:
      - ./runtime/config.yaml:/go/src/github.com/flipped-aurora/gin-vue-admin/server/config.docker.yaml
      - server-data:/data
      - uploads:/go/src/github.com/flipped-aurora/gin-vue-admin/server/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8888/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  web:
    build:
      context: ../../web
      dockerfile: ./Dockerfile
    container_name: ai-pcdn-web
    restart: unless-stopped
    ports:
      - "${AI_PCDN_WEB_PORT:-8080}:8080"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  server-data:
  uploads:
